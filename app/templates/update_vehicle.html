<style>/* Page background */
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(120deg, #eef2f7, #f8fafc);
  padding: 40px 20px;
  color: #1f2937;
}

/* Form container */
form {
  max-width: 520px;
  margin: 0 auto;
  background: #ffffff;
  padding: 30px 32px;
  border-radius: 16px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.12);
}

/* Heading */
h2 {
  text-align: center;
  margin-bottom: 24px;
  color: #004d99;
}

/* Labels */
label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  font-size: 14px;
  color: #374151;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 18px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  font-size: 14px;
  transition: all 0.2s ease;
}

/* Focus state */
input:focus {
  outline: none;
  border-color: #0a7cff;
  box-shadow: 0 0 0 2px rgba(10,124,255,0.15);
}

/* Submit button */
button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #0a7cff, #04befe);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

/* Button hover */
button:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(10,124,255,0.35);
}

/* Responsive */
@media (max-width: 600px) {
  form {
    padding: 24px;
  }
}
</style><h2>Update EV Vehicle</h2>

<form method="POST">
    <label for="vehicle_name">Vehicle Name</label>
    <input type="text" id="vehicle_name" name="vehicle_name" value="{{ vehicle.vehicle_name }}" required>

    <label for="vehicle_type">Vehicle Type</label>
    <input type="text" id="vehicle_type" name="vehicle_type" value="{{ vehicle.vehicle_type }}" required>

    <label for="license_plate">License Plate</label>
    <input type="text" id="license_plate" name="license_plate" value="{{ vehicle.license_plate }}" required>

    <label for="battery_capacity">Battery Capacity (kWh)</label>
    <input type="number" id="battery_capacity" name="battery_capacity" step="0.01" value="{{ vehicle.battery_capacity }}" required>

    <label for="range_per_charge">Range per Charge (km)</label>
    <input type="number" id="range_per_charge" name="range_per_charge" step="0.1" value="{{ vehicle.range_per_charge }}" required>


    <label for="max_charging_rate">Charging rate</label>
    <input type="number" id="max_charging_rate" name="max_charging_rate" step="0.1" value="{{ vehicle.max_charging_rate}}" required>

    <button type="submit">Update Vehicle</button>
</form>
