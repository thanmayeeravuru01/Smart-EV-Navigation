<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password – ChargeMate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .reset-card {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .reset-card h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #0a7cff;
        }

        .reset-card p {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: #0a7cff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #055fd1;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }

        .flash {
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .flash.danger {
            background: #ffe1e1;
            color: #b30000;
        }
    </style>
</head>

<body>

<div class="reset-card">

    <h2>Reset Password</h2>
    <p>Enter your new password below</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
        <input type="password" name="password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm New Password" required>

        <button type="submit">Update Password</button>
    </form>

    <div class="note">
        This link is valid for 1 hour only.
    </div>

</div>

</body>
</html>
