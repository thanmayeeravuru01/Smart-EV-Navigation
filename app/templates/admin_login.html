<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login – ChargeMate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/adminlogin.css') }}">
</head>
<body>

<div class="admin-login-wrapper">

    

    <div class="login-card">
        <h2>Admin Login</h2>
        <p class="subtitle">ChargeMate Control Panel</p>

        <form method="POST" action="{{ url_for('admin.login') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

</div>

<script>
/* Auto-hide flash */
setTimeout(() => {
    const f = document.querySelector('.flash-wrapper');
    if (f) f.style.display = 'none';
}, 3000);
</script>

</body>
</html>
