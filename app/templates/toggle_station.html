<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enable / Disable Stations | Admin</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/togglestations.css') }}">
</head>

<body>

<!-- FLASH NOTIFICATIONS -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-wrapper">
  {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}
{% endwith %}

<div class="ts-container">

  <!-- HEADER -->
  <div class="ts-header">
    <a href="{{ url_for('admin.stations_admin') }}" class="ts-back">← Back</a>
    <h1>Enable / Disable Charging Stations</h1>
  </div>

  <!-- CARD -->
  <div class="ts-card">

    <form action="{{ url_for('admin.toggle_station') }}" method="POST">

      <div class="form-group">
        <label for="station_id">Select Station</label>
        <select name="station_id" id="station_id" required>
          {% for station in stations %}
            <option value="{{ station.id }}">
              {{ station.name }} — Current: {{ station.status }}
            </option>
          {% else %}
            <option disabled>No stations available</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="status">Set Status</label>
        <select name="status" id="status" required>
          <option value="Enabled">Enable</option>
          <option value="Disabled">Disable</option>
        </select>
      </div>

      <button type="submit" class="ts-btn">Update Status</button>

    </form>

  </div>

</div>

<script>
/* Auto-hide flash */
setTimeout(() => {
  const f = document.querySelector('.flash-wrapper');
  if (f) f.style.display = 'none';
}, 3000);
</script>

</body>
</html>
