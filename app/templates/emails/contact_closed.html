<!DOCTYPE html>
<html>
<body style="background:#f4f6f8; font-family:Arial; padding:30px;">
  <table width="100%" style="max-width:600px; margin:auto; background:#fff;
    border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.15);">

    <tr>
      <td style="background:#0a7cff; padding:20px; color:#fff; text-align:center;">
        <h2>ChargeMate Support</h2>
      </td>
    </tr>

    <tr>
      <td style="padding:25px;">
        <p>Hi <b>{{ user_name }}</b>,</p>

        <p>Your support request has been resolved.</p>

        <p><b>Subject:</b> {{ subject }}</p>

        <div style="background:#f1f5ff; padding:15px; border-left:4px solid #0a7cff;">
          <b>Solution:</b><br>
          {{ solution }}
        </div>

        <p style="margin-top:20px;">
          If you have further questions, feel free to contact us again.
        </p>

        <p>Regards,<br><b>ChargeMate Support Team</b></p>
      </td>
    </tr>

    <tr>
      <td style="text-align:center; font-size:12px; color:#777; padding:15px;">
        © 2026 ChargeMate – This is an automated email
      </td>
    </tr>
  </table>
</body>
</html>
